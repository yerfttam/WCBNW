services:
  # ── Main website (static) ──────────────────────────────────────────────────
  - type: web
    name: wcbnw
    runtime: static
    staticPublishPath: NEW
    pullRequestPreviewsEnabled: true

  # ── Admin chat API (Python/Flask) ──────────────────────────────────────────
  - type: web
    name: wcbnw-admin-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: ADMIN_PASSWORD
        sync: false          # set manually in Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in Render dashboard
      - key: GITHUB_TOKEN
        sync: false          # set manually in Render dashboard
