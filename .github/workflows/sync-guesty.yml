name: Sync Guesty Listings

on:
  # Run daily at 9am Pacific (17:00 UTC)
  schedule:
    - cron: '0 17 * * *'
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Guesty sync
        env:
          GUESTY_CLIENT_ID: ${{ secrets.GUESTY_CLIENT_ID }}
          GUESTY_CLIENT_SECRET: ${{ secrets.GUESTY_CLIENT_SECRET }}
        run: python3 scripts/sync-guesty.py

      - name: Commit updated listings if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add NEW/data/listings.json
          if git diff --staged --quiet; then
            echo "No changes to listings.json — skipping commit"
          else
            git commit -m "chore: sync Guesty listings [skip ci]"
            git push
          fi

      - name: Notify success
        if: success()
        run: |
          curl -s \
            -H "Title: Guesty Sync OK" \
            -H "Tags: white_check_mark" \
            -d "Listings synced successfully at $(date -u '+%Y-%m-%d %H:%M UTC')" \
            https://ntfy.sh/${{ secrets.NTFY_TOPIC }}

      - name: Notify failure
        if: failure()
        run: |
          curl -s \
            -H "Title: Guesty Sync FAILED" \
            -H "Tags: x,rotating_light" \
            -H "Priority: high" \
            -d "Guesty sync failed — check GitHub Actions for details." \
            https://ntfy.sh/${{ secrets.NTFY_TOPIC }}
